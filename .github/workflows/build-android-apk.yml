name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start EAS APK build
        id: eas_build
        run: |
          eas build \
            --platform android \
            --profile preview-apk \
            --non-interactive \
            --wait \
            --json > eas-build.json

          node <<'NODE'
          const fs = require('fs')
          const builds = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'))
          const build = Array.isArray(builds) ? builds[0] : builds

          if (!build) {
            throw new Error('EAS build result is empty')
          }

          const downloadUrl =
            build?.artifacts?.buildUrl ??
            build?.artifacts?.applicationArchiveUrl ??
            ''

          const lines = [
            `build_id=${build.id ?? ''}`,
            `build_status=${build.status ?? ''}`,
            `download_url=${downloadUrl}`,
          ]

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join('\n')}\n`)
          NODE
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download APK
        if: ${{ steps.eas_build.outputs.download_url != '' }}
        run: |
          mkdir -p dist
          curl -L "${{ steps.eas_build.outputs.download_url }}" -o dist/vigo-trade.apk

      - name: Upload APK artifact
        if: ${{ steps.eas_build.outputs.download_url != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vigo-trade-android-apk
          path: dist/vigo-trade.apk
          if-no-files-found: error

      - name: Job summary
        run: |
          {
            echo "## Android APK build"
            echo ""
            echo "- Build status: ${{ steps.eas_build.outputs.build_status }}"
            echo "- EAS build id: ${{ steps.eas_build.outputs.build_id }}"
            echo "- Download URL: ${{ steps.eas_build.outputs.download_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
